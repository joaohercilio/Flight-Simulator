# sim_config.toml

[simulation]
t_start = 0.0
t_end   = 10.0
dt      = 0.01

[model]
file = "data/aircraft_model.dat"

[atmosphere]
model   = "constant"
density = 1.1        # kg/m^3
gravity = 9.81         # m/s^2

[initial_condition]
# Velocity body axis (m/s)
u = 0.0
v = 0.0
w = 0.0

# atitude (rad)
phi = 0.0
theta = 0.0
psi  = 0.0

# Ned positions (m)
x_e = 0.0
y_e = 0.0
z_e = -250.0

# Angular rates (rad/s)
p = 0.0
q = 0.0
r = 0.0

[plots]
save_figures = true
output_dir   = "results/"
show_gui     = true
